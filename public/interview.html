<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prep Yourself</title>
</head>
<body>
<div class="centered">
  <textarea id="topics" placeholder="Enter your resume topics separated by commas no spaces eg: Amazon,Project1,Kumon"></textarea>
</div>
<div id="main" class="centered">
  <div id="left"></div>
  <div id="right"></div>
</div>
<br><br>
<div class="centered">
  <button id="refresh">New Question!</button>
</div>
<script>
  // let topics = [
  //         "Pawfect Paradise",
  //         "Stat Project",
  //         "KidSpirit"
  // ]
  let questions = [
    "Tell me a challenge you faced - what was the challenge, <br>and how did you go about tackling it...",
    "Tell me about...",
    "Describe a goal you had when working for one of your roles...",
    "Tell me about when you faced a problem in a team...",
    "Tell me about a time where you faced multiple deadlines<br> How did you go about completing them...",
    "Describe a time when you had to adapt to a new situation...",
    "Why work at [target company]?",
    "Describe a time you had a disagreement with supervisor/coworker and how was it resolved",
    "Describe a time you had to rapidly adjust project needs",
    "Describe a time you had to rapidly learn something",
    "Describe a time you took initiative to solve a problem",
    "Describe a time that a team member that wasn’t doing their share of the work, how did you handle it?",
    "What is your greatest failure?",
    "How to design an API?",
    "Describe an API to someone who isn’t very technical?",
    "What is your proudest technical accomplishment?",
    "What is a time you worked well under pressure?",
    "How did you measure [metric] on your resume?",
    "How do you manage your time and prioritize tasks?",
    "How do you deliver or receive negative feedback?",
    "Describe project on your resume?",
    "Why did you use X skills/tools on project on your resume?"
  ]
  function refresh() {
    if (localStorage.getItem("intv-prep")!==null){
      document.getElementById("topics").value = localStorage.getItem("intv-prep");
      let topics = document.getElementById("topics").value.split(",");
      let question = questions[Math.floor(Math.random()*questions.length)]
      let topic = topics[Math.floor(Math.random()*topics.length)]
      if (Math.floor(Math.random()*10)<3){
        //open ended
        document.getElementById("left").innerHTML=question;
        document.getElementById("right").innerHTML="";
        console.log(question);
      }else{
        document.getElementById("left").innerHTML=question;
        document.getElementById("right").innerHTML=topic;
        console.log(question,topic);
      }
    }
  }
  document.getElementById("refresh").addEventListener("click",()=>{
    refresh();
  })
  document.getElementById("topics").addEventListener("input", function(){
    localStorage.setItem("intv-prep", document.getElementById("topics").value);
  })
  refresh();
</script>
<style>
  .centered{
    display:flex;
    width:100vw;
    margin-top:20px;
    justify-content: center;
    align-items: center;
  }
  #left{
    text-align:right;
    margin-right:5px;
  }
  #topics{
    width:500px;
    height:50px;
  }
</style>
</body>
</html>
